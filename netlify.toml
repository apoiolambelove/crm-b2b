[build]
  functions = "netlify/functions"
  publish = "public"

[functions]
  node_bundler = "esbuild"

# Redireciona /api/xxx -> função netlify correspondente, deixando as
# chamadas do frontend mais limpas (ex: /api/pedidos -> pedidos.js)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
